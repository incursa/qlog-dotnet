name: Publish NuGet Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 1.0.6.
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: publish-packages-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Validate NuGet credentials
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY secret is required to publish packages."
          }

      - name: Resolve package version
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:MANUAL_VERSION)) {
            $version = $env:MANUAL_VERSION.Trim()
          }
          elseif ($env:RELEASE_TAG.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $env:RELEASE_TAG.Substring(1)
          }
          else {
            throw "A version is required when the workflow is not triggered by a version tag."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM

      - name: Restore
        run: dotnet restore Incursa.Qlog.slnx

      - name: Build
        run: dotnet build Incursa.Qlog.slnx --no-restore --configuration Release -p:Version=${{ steps.version.outputs.version }} -p:ContinuousIntegrationBuild=true

      - name: Validate release/version policy
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          $tag = if ($env:MANUAL_VERSION) {
            "v$($env:MANUAL_VERSION.TrimStart('v'))"
          }
          else {
            $env:RELEASE_TAG
          }

          if (-not $tag) {
            throw "Manual publish requires 'version' input."
          }

          & "$env:GITHUB_WORKSPACE/scripts/release/validate-public-api-versioning.ps1" -Tag $tag

      - name: Pack packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/packages | Out-Null
          dotnet pack src/Incursa.Qlog/Incursa.Qlog.csproj --configuration Release --no-build --output artifacts/packages --include-symbols --include-source /p:Version=${{ steps.version.outputs.version }} /p:ContinuousIntegrationBuild=true
          dotnet pack src/Incursa.Qlog.Cbor/Incursa.Qlog.Cbor.csproj --configuration Release --no-build --output artifacts/packages --include-symbols --include-source /p:Version=${{ steps.version.outputs.version }} /p:ContinuousIntegrationBuild=true
          dotnet pack src/Incursa.Qlog.Quic/Incursa.Qlog.Quic.csproj --configuration Release --no-build --output artifacts/packages --include-symbols --include-source /p:Version=${{ steps.version.outputs.version }} /p:ContinuousIntegrationBuild=true

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/packages/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push artifacts/packages/*.snupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
