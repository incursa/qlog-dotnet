name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Incursa.Qlog.slnx

      - name: Build
        run: dotnet build Incursa.Qlog.slnx --no-restore --configuration Release -p:ContinuousIntegrationBuild=true

      - name: Validate SpecTrace JSON
        shell: pwsh
        run: pwsh -File scripts/Validate-SpecTraceJson.ps1

      - name: Run tests
        run: dotnet test Incursa.Qlog.slnx --no-build --configuration Release -v minimal

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/packages | Out-Null
          dotnet pack src/Incursa.Qlog/Incursa.Qlog.csproj --configuration Release --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
          dotnet pack src/Incursa.Qlog.Cbor/Incursa.Qlog.Cbor.csproj --configuration Release --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
          dotnet pack src/Incursa.Qlog.Quic/Incursa.Qlog.Quic.csproj --configuration Release --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
